version: "3.9"

services:
  postgres:
    image: postgres:16
    container_name: payflowx-postgres
    restart: always
    environment:
      POSTGRES_DB: payflowx
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: payflowx-redis
    restart: always
    ports:
      - "6379:6379"

volumes:
  postgres-data:
